name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          registry-url: https://npm.pkg.github.com
      - name: Configure npm auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${GH_PACKAGES_TOKEN}" >> ~/.npmrc
          echo "@napgram:registry=https://npm.pkg.github.com" >> ~/.npmrc
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Check
        run: pnpm check
      - name: Build
        run: pnpm build
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          github-token: ${{ secrets.GH_PACKAGES_TOKEN }}
          publish: pnpm changeset publish --registry https://npm.pkg.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
