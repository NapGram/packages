name: Renovate Auto Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      (github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'app/renovate') &&
      github.event.pull_request.base.ref == 'main' &&
      !github.event.pull_request.draft
    steps:
      - name: Enable auto-merge for Renovate PRs
        run: gh pr merge --auto --merge --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
