version: 2
updates:
  # Dependabot version updates are disabled for this repository.
  # Security alerts remain available via GitHub Dependabot Alerts.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "main"
    ignore:
      - dependency-name: "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "main"
    ignore:
      - dependency-name: "*"
